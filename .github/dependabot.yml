version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"
    commit-message:
      prefix: "chore(ci): "
    groups:
      actions-major:
        patterns:
          - "*"
    ignore:
      - dependency-name: "supabase/setup-cli"
        update-types:
          - "version-update:semver-major"
    cooldown:
      default-days: 7
  - package-ecosystem: "gomod"
    directories:
      - "/apps/cli-go"
      - "/apps/cli-go/pkg"
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"
    groups:
      go-minor:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - github.com/compose-spec/compose-go/v2
    ignore:
      - dependency-name: "github.com/compose-spec/compose-go/v2"
      - dependency-name: "github.com/docker/cli"
      - dependency-name: "github.com/docker/docker"
    cooldown:
      default-days: 7
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"
    groups:
      npm-major:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: "docker"
    directory: "/apps/cli-go/pkg/config/templates"
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"
    commit-message:
      prefix: "fix(docker): "
    groups:
      docker-minor:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "library/kong"
      - dependency-name: "axllent/mailpit"
      - dependency-name: "darthsim/imgproxy"
      - dependency-name: "timberio/vector"
      # Held back: v2.109.0+ adds a setup_supabase_realtime_admin migration
      # that fails against the CLI's local Postgres and breaks `supabase start`.
      # Remove once the CLI's local stack is compatible with the new migration.
      - dependency-name: "supabase/realtime"
        versions:
          - ">= 2.109.0"
    cooldown:
      default-days: 7
      exclude:
        - "supabase/*"
