name: Mirror Dependencies
# We mirror upstream container images like Migra, imgproxy, etc. because these
# are usually only available on certain image registry and not others (e.g. only
# on Docker Hub and not on ghcr.io or AWS ECR).
#
# For container images that we control, we usually publish to Docker Hub,
# ghcr.io, and AWS ECR.

on:
  # This workflow is the manual/bulk entry point for re-mirroring everything.
  # Template image bumps are mirrored automatically by mirror-template-images.yml
  # on push to develop, which backfills any unmirrored tag when the templates
  # Dockerfile changes — so develop and PRs rebased on it stop inheriting the
  # `manifest unknown` failure in the ghcr.io-pinned `Start` check.
  workflow_dispatch:
permissions:
  contents: read

jobs:
  setup:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      tags: ${{ steps.list.outputs.tags }}
      curr: ${{ steps.curr.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true
      - id: list
        run: |
          echo "tags=$(go run tools/listdep/main.go)" >> $GITHUB_OUTPUT
      - id: curr
        name: List main branch dependencies
        if: github.ref != 'refs/heads/main'
        run: |
          git fetch origin main
          git checkout main
          echo "tags=$(go run tools/listdep/main.go)" >> $GITHUB_OUTPUT

  publish:
    needs:
      - setup
    permissions:
      contents: read
      packages: write
      id-token: write
    if: ${{ needs.setup.outputs.tags != needs.setup.outputs.curr }}
    strategy:
      matrix:
        src: ${{ fromJson(needs.setup.outputs.tags) }}
    # Call workflow explicitly because events from actions cannot trigger more actions
    uses: ./.github/workflows/cli-go-mirror-image.yml
    with:
      image: ${{ matrix.src }}
    secrets:
      PROD_AWS_ROLE: ${{ secrets.PROD_AWS_ROLE }}
defaults:
  run:
    working-directory: apps/cli-go
