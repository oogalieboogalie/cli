name: CI

on:
  pull_request:
    paths:
      - apps/cli-go/**
  merge_group:
  push:
    branches:
      - develop
    paths:
      - apps/cli-go/**

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true

      # Required by: internal/utils/credentials/keyring_test.go
      - uses: t1m0thyj/unlock-keyring@cbcf205c879ebd86add70bab3a6abfcce59a5cae # v1.2.0
      - run: |
          pkgs=$(go list ./pkg/... | grep -Ev 'pkg/api' | paste -sd ',' -)
          go tool gotestsum -- -race -v -count=1 ./... \
          -coverpkg="./cmd/...,./internal/...,${pkgs}" -coverprofile=coverage.out

      - name: Check existing coverage cache
        id: coverage-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/cli-go/coverage.out
          key: cli-go-coverage-${{ github.run_id }}-v1
          lookup-only: true

      - name: Save coverage cache
        if: steps.coverage-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/cli-go/coverage.out
          key: cli-go-coverage-${{ github.run_id }}-v1

  coverage:
    name: Coverage
    needs:
      - test
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Restore coverage cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/cli-go/coverage.out
          key: cli-go-coverage-${{ github.run_id }}-v1
          fail-on-cache-miss: true
      - name: Move coverage report
        run: cp apps/cli-go/coverage.out coverage.out
        working-directory: .
      - uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          file: coverage.out
          format: golang

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/cli-go/go.mod
          # Linter requires no cache
          cache: false

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          args: --timeout 5m --verbose
          version: latest
          only-new-issues: true
          working-directory: apps/cli-go

  start:
    name: Start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true
      - run: go build main.go
      - run: ./main init
      - run: sed -i '/\[db.pooler\]/{n;s/.*/enabled = true/}' supabase/config.toml
      - run: ./main start --workdir tests
        env:
          SUPABASE_INTERNAL_IMAGE_REGISTRY: ghcr.io
      - name: Install websocat
        run: |
          sudo wget -qO /usr/local/bin/websocat https://github.com/vi/websocat/releases/latest/download/websocat.x86_64-unknown-linux-musl
          sudo chmod a+x /usr/local/bin/websocat
          websocat --version
      - run: ./e2e-test.sh ./main

  link:
    name: Link
    if: ${{ github.event_name == 'merge_group' || (github.event_name ==
      'pull_request' && !github.event.pull_request.head.repo.fork) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true
      - run: go build main.go
      - run: ./main link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

  codegen:
    name: Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true

      - run: go generate
      - run: |
          if ! git diff --ignore-space-at-eol --exit-code --quiet pkg; then
            echo "Detected uncommitted changes after codegen. See status below:"
            git diff
            exit 1
          fi
defaults:
  run:
    working-directory: apps/cli-go
