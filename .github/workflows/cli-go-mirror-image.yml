name: Mirror Image

on:
  repository_dispatch:
    types:
      - mirror-image
  workflow_call:
    inputs:
      image:
        required: true
        type: string
    secrets:
      PROD_AWS_ROLE:
        required: true
  workflow_dispatch:
    inputs:
      image:
        description: "org/image:tag"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - id: strip
        env:
          TAG: ${{ github.event.client_payload.image || inputs.image }}
        run: |
          echo "image=${TAG##*/}" >> $GITHUB_OUTPUT
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE }}
          aws-region: us-east-1
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: public.ecr.aws
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Mirror image
        env:
          SOURCE_IMAGE: docker.io/${{ github.event.client_payload.image || inputs.image }}
          ECR_IMAGE: public.ecr.aws/supabase/${{ steps.strip.outputs.image }}
          GHCR_IMAGE: ghcr.io/supabase/${{ steps.strip.outputs.image }}
        run: |
          docker buildx imagetools create \
            --prefer-index=false \
            -t "$ECR_IMAGE" \
            -t "$GHCR_IMAGE" \
            "$SOURCE_IMAGE"
