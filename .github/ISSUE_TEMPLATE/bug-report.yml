name: Bug report
description: Report a reproducible problem with the Supabase CLI.
labels:
  - 🐛 Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the Supabase CLI. Please include the exact command and output whenever possible so maintainers can reproduce the issue quickly.

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Pick the area that best matches the failing command or workflow.
      options:
        - Auth
        - Database
        - Edge Functions
        - Migrations
        - Storage
        - Local development
        - Docker
        - Seeding
        - Realtime
        - Installation
        - Other
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: Supabase CLI version
      description: Run `supabase --version`.
      placeholder: v2.23.4
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5, Ubuntu 24.04, Windows 11, etc.
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - brew
        - bun
        - npm
        - pnpm
        - yarn
        - Docker image
        - GitHub release binary
        - Other
    validations:
      required: false

  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command you ran.
      render: shell
      placeholder: supabase db push
    validations:
      required: true

  - type: textarea
    id: actual-output
    attributes:
      label: Actual output
      description: Paste the full error, log output, or terminal output. Remove secrets before submitting.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect the CLI to do instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the smallest project, config, schema, or command sequence that reproduces the problem.
      placeholder: |
        1. Run `supabase init`
        2. Configure ...
        3. Run ...
        4. See ...
    validations:
      required: true

  - type: input
    id: ticket-id
    attributes:
      label: Crash report ID
      description: If the CLI printed one after rerunning with `--create-ticket`, paste the crash report ID.
      placeholder: ab1ac733e31e4f928a4d7c8402543712
    validations:
      required: false

  - type: textarea
    id: docker-services
    attributes:
      label: Docker and service versions
      description: For local development issues, include `docker version` and `supabase services` output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, links, package versions, browser details, or anything else that helps explain the issue.
    validations:
      required: false
