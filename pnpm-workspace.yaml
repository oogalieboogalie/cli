packages:
  - "packages/*"
  - "apps/*"
  - "tools/*"

allowBuilds:
  '@parcel/watcher': true
  "@swc/core": true
  esbuild: true
  msgpackr-extract: true
  nx: true
  sharp: true

catalog:
  "@effect/atom-react": "4.0.0-beta.80"
  "@effect/platform-bun": "4.0.0-beta.80"
  "@effect/platform-node": "4.0.0-beta.80"
  "@effect/sql-pg": "4.0.0-beta.80"
  "@effect/vitest": "^4.0.0-beta.80"
  "@nx/devkit": "^22.7.5"
  "@swc-node/register": "^1.10.9"
  "@swc/core": "^1.15.41"
  "@tsconfig/bun": "^1.0.10"
  "@types/bun": "^1.3.14"
  "@typescript/native-preview": "7.0.0-dev.20260611.2"
  "@vitest/coverage-istanbul": "^4.1.8"
  "effect": "4.0.0-beta.80"
  "knip": "^6.15.0"
  "nx": "^22.7.5"
  "oxfmt": "^0.54.0"
  "oxlint": "^1.68.0"
  "oxlint-tsgolint": "^0.23.0"
  "tldts": "^7.4.2"
  "vitest": "^4.1.8"

blockExoticSubdeps: true

minimumReleaseAge: 0

supportedArchitectures:
  cpu:
    - current
    - arm64
    - x64
  libc:
    - current
    - glibc
    - musl
  os:
    - current
    - darwin
    - linux
    - win32
